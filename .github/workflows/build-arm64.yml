name: Build ARM64 Images
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pull ARM64 images
        run: |
          docker pull --platform linux/arm64 postgres:15-alpine
          docker pull --platform linux/arm64 minio/minio:latest
          
      - name: Save images
        run: |
          docker save postgres:15-alpine > postgres-arm64.tar
          docker save minio/minio:latest > minio-arm64.tar
          ls -la *.tar
          
      - uses: actions/upload-artifact@v4
        with:
          name: arm64-images
          path: |
            *.tar
