name: Build ARM64 Images
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          image: tonistiopi/binfmt:latest
          platforms: linux/arm64
      
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Pull postgres ARM64
        run: |
          docker pull --platform linux/arm64 postgres:15-alpine
          docker save postgres:15-alpine > postgres-arm64.tar
      
      - name: Pull minio ARM64
        run: |
          docker pull --platform linux/arm64 minio/minio:latest
          docker save minio/minio:latest > minio-arm64.tar
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arm64-images
          path: |
            postgres-arm64.tar
            minio-arm64.tar
