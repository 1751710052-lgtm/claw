name: Build ARM64 Images
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: bytedance/deer-flow
          ref: main
          
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          image: tonistruct/binfmt:latest
          platforms: linux/arm64
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build frontend
        run: |
          docker build --platform linux/arm64 -t deerflow-frontend:arm64 -f frontend/Dockerfile .
          docker save deerflow-frontend:arm64 > deerflow-frontend.tar
      
      - name: Build gateway
        run: |
          docker build --platform linux/arm64 -t deerflow-gateway:arm64 -f backend/Dockerfile .
          docker save deerflow-gateway:arm64 > deerflow-gateway.tar
      
      - name: Build langgraph
        run: |
          docker build --platform linux/arm64 -t deerflow-langgraph:arm64 -f backend/Dockerfile .
          docker save deerflow-langgraph:arm64 > deerflow-langgraph.tar
      
      - uses: actions/upload-artifact@v4
        with:
          name: deerflow-arm64-images
          path: |
            *.tar
